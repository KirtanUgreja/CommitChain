name: CI/CD — Test + Build + Push to ECR

on:
  push:
    branches: [main]

jobs:
  test:
    name: Run Smart Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: ./contracts
        run: npm install

      - name: Run tests
        working-directory: ./contracts
        run: npx hardhat test

  build-and-push:
    name: Build Docker + Push to ECR
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        working-directory: ./backend
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/commitchain-backend:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/commitchain-backend:latest .
          docker push $ECR_REGISTRY/commitchain-backend:$IMAGE_TAG
          docker push $ECR_REGISTRY/commitchain-backend:latest

      - name: Image pushed
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: echo "Image pushed $ECR_REGISTRY/commitchain-backend:$IMAGE_TAG"
